name: Reusable Docker CI

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ inputs.image_name }}:${{ inputs.tag }} .

      - name: Push Image
        run: docker push ${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Scan Image with Trivy
  uses: aquasecurity/trivy-action@master
  with:
    image-ref: ${{ inputs.image_name }}:${{ inputs.tag }}
    format: 'table'
    exit-code: '1'
    severity: 'CRITICAL,HIGH'

      - name: Slack Success Notification
  if: success()
  run: |
    echo "Slack success notification would be sent here"

    - name: Slack Failure Notification
  if: failure()
  run: |
    echo "Slack failure notification would be sent here"
